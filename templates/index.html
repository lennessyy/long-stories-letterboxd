<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Long Stories · Letterboxd</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Serif+Display&family=DM+Serif+Text&family=Source+Serif+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #0a0a0a; color: #fff; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }
  #root { min-height: 100%; }

  .film-strip {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; overflow: hidden; z-index: 0; opacity: 0.04;
  }
  .film-strip::before, .film-strip::after {
    content: ''; position: absolute; top: -20px; bottom: -20px; width: 48px;
    background: repeating-linear-gradient(to bottom,
      transparent 0px, transparent 8px, #fff 8px, #fff 24px, transparent 24px, transparent 32px);
  }
  .film-strip::before { left: 12px; }
  .film-strip::after { right: 12px; }
</style>
</head>
<body>
<div class="film-strip"></div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js"></script>

<script type="text/babel" src="/static/templates.jsx"></script>

{% raw %}
<script type="text/babel">
const { STORY_TEMPLATES, STORY_W, STORY_H } = window;
const isShort = (r) => (r.review || "").length <= 400;

const TAGLINES = [
  "I'm a manipulative megalomaniac who's intensely opportunistic.",
  "I see dead people.",
  "I ate his liver with some fava beans and a nice Chianti.",
  "I'm not even supposed to be here today.",
  "I drink your milkshake. I drink it up.",
  "That rug really tied the room together.",
  "I'm having an old friend for dinner.",
  "I'm the king of the world!",
  "You're gonna need a bigger boat.",
  "Here's Johnny!",
  "I am serious. And don't call me Shirley.",
  "I'm walking here! I'm walking here!",
  "Keep the change, ya filthy animal.",
  "I'm in a glass case of emotion!",
  "I volunteer as tribute.",
  "It's not a man purse. It's called a satchel.",
  "I'm just a girl, standing in front of a boy, asking him to love her.",
  "I'm gonna make him an offer he can't refuse.",
  "On Wednesdays we wear pink.",
  "I feel the need... the need for speed.",
  "That's my secret, Captain. I'm always angry.",
  "Fish are friends, not food.",
  "Why are you so obsessed with me?",
  "I live my life a quarter mile at a time.",
  "I'm not superstitious, but I am a little stitious.",
  "So you're telling me there's a chance.",
];
const tagline = TAGLINES[Math.floor(Math.random() * TAGLINES.length)];

function proxyImg(url) {
  if (!url) return url;
  return "/image-proxy?url=" + encodeURIComponent(url);
}

// Adapter: convert app.py review shape → template shape
function adapt(r) {
  const img = proxyImg(r.backdrop_url);
  return {
    id: r.movie_title + r.year,
    title: r.movie_title,
    year: r.year,
    rating: Number(r.rating) || 0,
    review: r.review_text || "",
    poster: img,
    backdrop: img,
    accent: "#ff8000",
    reviewer: r.reviewer_handle,
  };
}

function Landing({ onGenerate, loading, error }) {
  const [url, setUrl] = React.useState("");
  return (
    <div style={{ height: "100dvh", maxHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40, gap: 20, position: "relative", overflow: "hidden" }}>
      <h1 style={{ fontSize: 38, fontWeight: 800, letterSpacing: -1 }}>
        Long Stories <span style={{ color: "#ff8800" }}>for Letterboxd</span>
      </h1>
      <p style={{ opacity: 0.4, fontStyle: "italic", fontSize: 14 }}>{tagline}</p>
      <p style={{ opacity: 0.6, maxWidth: 420, textAlign: "center", lineHeight: 1.5 }}>
        Paste a review URL. We'll generate three story designs you can swipe between.
      </p>
      <div style={{ display: "flex", gap: 10, width: "100%", maxWidth: 520 }}>
        <input value={url} onChange={e => setUrl(e.target.value)}
          placeholder="https://letterboxd.com/yourname/film/..."
          onKeyDown={e => e.key === "Enter" && url && onGenerate(url)}
          style={{ flex: 1, background: "#1a1a1f", border: "1px solid #333", borderRadius: 10, color: "#fff", fontSize: 15, padding: "14px 16px", outline: "none" }} />
        <button disabled={!url || loading} onClick={() => onGenerate(url)}
          style={{ background: loading ? "#2a4a2e" : "#00c030", border: "none", borderRadius: 10, color: "#000", fontWeight: 600, padding: "14px 22px", cursor: loading ? "default" : "pointer" }}>
          {loading ? "Loading…" : "Generate"}
        </button>
      </div>
      {error && <div style={{ color: "#e05555", fontSize: 14 }}>{error}</div>}
      <div style={{ position: "absolute", bottom: 16, display: "flex", alignItems: "center", gap: 12 }}>
        <span style={{ fontSize: 11, color: "#555", letterSpacing: 0.3 }}>follow me</span>
        <a href="https://letterboxd.com/lennessy/" target="_blank" rel="noopener" title="Letterboxd"
          style={{ display: "flex", opacity: 0.5 }}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="8" cy="12" r="5" fill="#00e054"/><circle cx="16" cy="12" r="5" fill="#40bcf4"/><circle cx="12" cy="12" r="5" fill="#ff8000" opacity="0.85"/>
          </svg>
        </a>
        <a href="https://bsky.app/profile/lennessy.bsky.social" target="_blank" rel="noopener" title="Bluesky"
          style={{ display: "flex", opacity: 0.5 }}>
          <svg width="18" height="18" viewBox="0 0 568 501" fill="#1185fe">
            <path d="M123.121 33.664C188.241 82.553 258.281 181.68 284 234.873c25.719-53.192 95.759-152.32 160.879-201.21C491.866-1.611 568-28.906 568 57.947c0 17.346-9.945 145.713-15.778 166.555-20.275 72.453-94.155 90.933-159.875 79.748C507.222 323.8 536.444 388.56 500.222 453.32c-57.475 102.794-164.889-25.817-178.246-58.99-2.86-7.098-4.196-10.438-37.976-10.438-33.78 0-35.116 3.34-37.976 10.438C232.667 427.503 125.253 556.114 67.778 453.32 31.556 388.56 60.778 323.8 175.653 304.25c-65.72 11.185-139.6-7.295-159.875-79.748C9.945 203.66 0 75.293 0 57.947 0-28.906 76.134-1.611 123.121 33.664z"/>
          </svg>
        </a>
      </div>
    </div>
  );
}

function Carousel({ review, onBack }) {
  const templates = isShort(review) ? STORY_TEMPLATES.short : STORY_TEMPLATES.long;
  const [idx, setIdx] = React.useState(0);
  const [saving, setSaving] = React.useState(false);
  const refs = React.useRef({});

  React.useEffect(() => {
    window.scrollTo(0, 0);
    const onKey = (e) => {
      if (e.key === "ArrowLeft") setIdx(i => Math.max(0, i - 1));
      else if (e.key === "ArrowRight") setIdx(i => Math.max(0, Math.min(templates.length - 1, i + 1)));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [templates.length]);

  // swipe
  const touch = React.useRef(null);
  const onTouchStart = (e) => { touch.current = { x: e.touches[0].clientX, idx }; };
  const onTouchEnd = (e) => {
    if (!touch.current) return;
    const dx = e.changedTouches[0].clientX - touch.current.x;
    if (Math.abs(dx) > 50) {
      setIdx(Math.max(0, Math.min(templates.length - 1, touch.current.idx + (dx < 0 ? 1 : -1))));
    }
    touch.current = null;
  };

  async function download() {
    setSaving(true);
    try {
      const node = refs.current[idx];
      const dataUrl = await htmlToImage.toPng(node, { width: STORY_W, height: STORY_H, pixelRatio: 1, cacheBust: true });
      const a = document.createElement("a");
      a.href = dataUrl;
      a.download = `${review.title}-${templates[idx].id}.png`;
      a.click();
    } catch (e) { alert("Save failed: " + e.message); }
    setSaving(false);
  }

  async function share() {
    setSaving(true);
    try {
      const node = refs.current[idx];
      const blob = await htmlToImage.toBlob(node, { width: STORY_W, height: STORY_H, pixelRatio: 1, cacheBust: true });
      const file = new File([blob], "story.png", { type: "image/png" });
      if (navigator.share && navigator.canShare?.({ files: [file] })) {
        await navigator.share({ files: [file] });
      } else {
        // fallback to download
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${review.title}.png`;
        a.click();
      }
    } catch (e) {
      if (e.name !== "AbortError") {
        alert("Share failed: " + e.message);
      }
    }
    setSaving(false);
  }

  const availH = window.innerHeight - 200;
  const maxCardH = Math.min(availH, 700);
  const cardH = Math.max(maxCardH, 300);
  const cardW = cardH * (STORY_W / STORY_H);
  const scale = cardW / STORY_W;

  return (
    <div style={{ height: "100dvh", maxHeight: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <div style={{ padding: "12px 20px 4px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <button onClick={onBack} style={{ background: "none", border: "none", color: "#fff", fontSize: 14, cursor: "pointer" }}>← Back</button>
        <div style={{ fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", opacity: 0.5 }}>
          {isShort(review) ? "Short" : "Long"} · {templates.length} layouts
        </div>
        <div style={{ width: 50 }} />
      </div>

      <div style={{ flex: 1, position: "relative", overflow: "hidden", display: "flex", alignItems: "center" }}
        onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <div style={{ display: "flex", gap: 20, padding: "0 20px",
          transform: `translateX(calc(50vw - ${cardW / 2}px - 20px - ${idx * (cardW + 20)}px))`,
          transition: "transform 0.35s cubic-bezier(0.4,0,0.2,1)" }}>
          {templates.map((t, i) => {
            const Template = t.component;
            return (
              <div key={t.id} onClick={() => setIdx(i)} style={{ width: cardW, height: cardH, flexShrink: 0,
                borderRadius: 18, overflow: "hidden",
                boxShadow: "0 20px 60px rgba(0,0,0,0.6)",
                transform: i === idx ? "scale(1)" : "scale(0.92)", opacity: i === idx ? 1 : 0.6,
                transition: "transform 0.35s, opacity 0.35s", position: "relative",
                cursor: i === idx ? "default" : "pointer" }}>
                <div ref={el => (refs.current[i] = el)} style={{ width: STORY_W, height: STORY_H, transform: `scale(${scale})`, transformOrigin: "top left", position: "absolute", top: 0, left: 0 }}>
                  <Template review={review} />
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ textAlign: "center", fontSize: 13, fontWeight: 500, padding: "6px 0 2px" }}>
        {templates[idx].name}
      </div>
      <div style={{ display: "flex", justifyContent: "center", gap: 8, padding: "4px 0 8px" }}>
        {templates.map((_, i) => (
          <button key={i} onClick={() => setIdx(i)} style={{ width: i === idx ? 22 : 6, height: 6, borderRadius: 3,
            background: i === idx ? "#00e054" : "rgba(255,255,255,0.3)", border: "none", cursor: "pointer",
            transition: "width 0.2s, background 0.2s", padding: 0 }} />
        ))}
      </div>

      <div style={{ padding: "4px 20px 12px", display: "flex", gap: 10, maxWidth: 480, margin: "0 auto", width: "100%" }}>
        <button onClick={download} disabled={saving} style={{ flex: 1, height: 44, borderRadius: 12,
          background: "rgba(255,255,255,0.1)", border: "none", color: "#fff", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
          {saving ? "Saving…" : "Download PNG"}
        </button>
        <button onClick={share} disabled={saving} style={{ flex: 2, height: 44, borderRadius: 12,
          background: "linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045)", border: "none", color: "#fff",
          fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
          Share to Instagram
        </button>
      </div>
    </div>
  );
}

function App() {
  const [review, setReview] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState("");

  async function generate(url) {
    setLoading(true); setError("");
    try {
      const resp = await fetch("/review-data", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });
      if (!resp.ok) throw new Error((await resp.json()).error || "Failed");
      const data = await resp.json();
      setReview(adapt(data));
    } catch (e) { setError(e.message); }
    setLoading(false);
  }

  if (!review) return <Landing onGenerate={generate} loading={loading} error={error} />;
  return <Carousel review={review} onBack={() => setReview(null)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
{% endraw %}
</body>
</html>
