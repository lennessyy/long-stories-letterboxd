<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Long Stories for Letterboxd</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 32px;
      overflow-x: hidden;
    }

    .film-strip {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
      opacity: 0.04;
    }
    .film-strip::before, .film-strip::after {
      content: '';
      position: absolute;
      top: -20px;
      bottom: -20px;
      width: 48px;
      background:
        repeating-linear-gradient(
          to bottom,
          transparent 0px,
          transparent 8px,
          #fff 8px,
          #fff 24px,
          transparent 24px,
          transparent 32px
        );
    }
    .film-strip::before { left: 12px; }
    .film-strip::after { right: 12px; }

    .subtitle {
      font-size: 0.85rem;
      color: #666;
      font-style: italic;
      margin-top: -20px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #e8e8e8;
      position: relative;
      z-index: 1;
    }
    h1 .accent { color: #ff8800; }

    .input-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
    }

    input[type="url"] {
      flex: 1;
      background: #1a1a1f;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      font-size: 1rem;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="url"]:focus { border-color: #ff8800; }
    input[type="url"]::placeholder { color: #555; }

    button {
      background: #00c030;
      border: none;
      border-radius: 10px;
      color: #000;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 14px 22px;
      transition: background 0.15s;
      white-space: nowrap;
      position: relative;
      z-index: 1;
    }
    button:hover { background: #00d936; }
    button:disabled { background: #2a4a2e; color: #555; cursor: default; }

    .sample-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      font-size: 0.85rem;
      font-weight: 400;
      padding: 10px 16px;
    }
    .sample-btn:hover { border-color: #555; color: #bbb; background: transparent; }

    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
      position: relative;
      z-index: 1;
    }
    #status.error { color: #e05555; }

    .loading-quotes {
      font-style: italic;
      color: #777;
      font-size: 0.85rem;
      animation: fadeQuote 0.5s ease-in;
    }
    @keyframes fadeQuote {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .preview-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .story-frame {
      width: 405px;
      max-width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
      animation: slideUp 0.4s ease-out;
    }
    .story-frame img {
      width: 100%;
      display: block;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .action-row {
      display: flex;
      gap: 12px;
      animation: slideUp 0.4s ease-out 0.1s both;
    }

    .share-btn {
      background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
      color: #fff;
      font-size: 1rem;
      padding: 14px 28px;
    }
    .share-btn:hover { opacity: 0.9; background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045); }

    .download-btn {
      background: #1a1a1f;
      border: 1px solid #333;
      color: #ccc;
      font-size: 0.95rem;
    }
    .download-btn:hover { background: #222; border-color: #555; }
  </style>
</head>
<body>
  <div class="film-strip"></div>

  <h1>Long Stories <span class="accent">for Letterboxd</span></h1>
  <p class="subtitle" id="tagline"></p>

  <div class="input-row">
    <input type="url" id="url-input" placeholder="Paste a Letterboxd review URL..." />
    <button id="generate-btn" onclick="generate()">Generate</button>
  </div>

  <div class="input-row" style="justify-content:center">
    <button class="sample-btn" onclick="generateSample()">Try with sample review</button>
  </div>

  <div id="status"></div>

  <div class="preview-wrap" id="preview-wrap">
    <div class="story-frame">
      <img id="story-img" src="" alt="Generated story" />
    </div>
    <div class="action-row">
      <button class="share-btn" onclick="shareToInstagram()">Share to Instagram Stories</button>
      <button class="download-btn" onclick="downloadImage()">Download</button>
    </div>
  </div>

  <script>
    const TAGLINES = [
      "I'm a manipulative megalomaniac who's intensely opportunistic.",
      "I see dead people.",
      "I ate his liver with some fava beans and a nice Chianti.",
      "I'm not even supposed to be here today.",
      "I drink your milkshake. I drink it up.",
      "That rug really tied the room together.",
      "I'm having an old friend for dinner.",
      "I'm the king of the world!",
      "You're gonna need a bigger boat.",
      "Here's Johnny!",
      "I am serious. And don't call me Shirley.",
      "I'm walking here! I'm walking here!",
      "Keep the change, ya filthy animal.",
      "I'm in a glass case of emotion!",
      "I volunteer as tribute.",
      "It's not a man purse. It's called a satchel.",
      "I'm just a girl, standing in front of a boy, asking him to love her.",
      "I'm gonna make him an offer he can't refuse.",
      "On Wednesdays we wear pink.",
      "I feel the need... the need for speed.",
      "That's my secret, Captain. I'm always angry.",
      "Fish are friends, not food.",
      "Why are you so obsessed with me?",
      "I live my life a quarter mile at a time.",
      "I'm not superstitious, but I am a little stitious.",
      "So you're telling me there's a chance.",
    ];
    document.getElementById("tagline").textContent =
      TAGLINES[Math.floor(Math.random() * TAGLINES.length)];

    const QUOTES = [
      "Rewinding the tape...",
      "Checking the projection booth...",
      "Consulting the film critics...",
      "Developing in the darkroom...",
      "Rolling the credits...",
      "Adjusting the aspect ratio...",
      "Finding the director's cut...",
      "Splicing the reels together...",
    ];

    let currentImageUrl = null;
    let quoteInterval = null;

    function showLoadingQuote() {
      const el = document.getElementById("status");
      let i = Math.floor(Math.random() * QUOTES.length);
      el.innerHTML = `<span class="loading-quotes">${QUOTES[i]}</span>`;
      quoteInterval = setInterval(() => {
        i = (i + 1) % QUOTES.length;
        el.innerHTML = `<span class="loading-quotes">${QUOTES[i]}</span>`;
      }, 2500);
    }

    function stopLoadingQuote() {
      if (quoteInterval) { clearInterval(quoteInterval); quoteInterval = null; }
    }

    async function generate(url) {
      const input = document.getElementById("url-input");
      const reviewUrl = url || input.value.trim();
      if (!reviewUrl) return;
      showLoadingQuote();
      setGenerating(true);

      try {
        const resp = await fetch("/preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url: reviewUrl }),
        });
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || "Failed to generate");
        }
        const blob = await resp.blob();
        if (currentImageUrl) URL.revokeObjectURL(currentImageUrl);
        currentImageUrl = URL.createObjectURL(blob);
        document.getElementById("story-img").src = currentImageUrl;
        document.getElementById("preview-wrap").style.display = "flex";
        stopLoadingQuote();
        setStatus("");
      } catch (e) {
        stopLoadingQuote();
        setStatus(e.message, true);
      } finally {
        setGenerating(false);
      }
    }

    function generateSample() {
      generate("__sample__");
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = isError ? "error" : "";
    }

    function setGenerating(on) {
      document.getElementById("generate-btn").disabled = on;
    }

    async function shareToInstagram() {
      if (!currentImageUrl) return;
      const blob = await fetch(currentImageUrl).then(r => r.blob());
      const file = new File([blob], "story.jpg", { type: "image/jpeg" });
      if (navigator.share && navigator.canShare({ files: [file] })) {
        try {
          await navigator.share({ files: [file], title: "My Letterboxd review" });
        } catch (e) {
          if (e.name !== "AbortError") alert("Share failed: " + e.message);
        }
      } else {
        alert("Web Share not supported on this browser. Use Download and share manually.");
      }
    }

    function downloadImage() {
      if (!currentImageUrl) return;
      const a = document.createElement("a");
      a.href = currentImageUrl;
      a.download = "letterboxd-story.jpg";
      a.click();
    }

    document.getElementById("url-input").addEventListener("keydown", e => {
      if (e.key === "Enter") generate();
    });
  </script>
</body>
</html>
